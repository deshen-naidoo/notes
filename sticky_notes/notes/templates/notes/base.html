{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sticky Notes App</title>
    <!-- Using Bootstrap CDN for styling structure -->
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
      rel="stylesheet">
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-warning mb-4">
        <div class="container">
            <a class="navbar-brand text-dark fw-bold" href="{% url 'note_list' %}">
                📝 Sticky Notes
            </a>
            <a href="{% url 'note_create' %}" class="btn btn-dark btn-sm">
                + New Note
            </a>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center mt-5 text-muted">
        <small>&copy; 2026 deshen.naidoo@gmail.com</small>
    </footer>
</body>
</html>
